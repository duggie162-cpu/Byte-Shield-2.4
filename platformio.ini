; ─────────────────────────────────────────────────────────────
;  ByteShield DC-01  —  2.4" CYD (ESP32-2432S024R)
;
;  This firmware consumes the shared byteshield-core library via a
;  local path during development. Once core stabilizes, switch the
;  path to a pinned git submodule so each firmware locks a known
;  core version.
; ─────────────────────────────────────────────────────────────
[env:esp32-2432S024R]
platform = espressif32@6.12.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    file://../byteshield-core
    h2zero/NimBLE-Arduino@^1.4.2
    mikalhart/TinyGPSPlus@^1.0.3

build_flags =
    ; ---- TFT_eSPI: ILI9341 on the 2.4" S024 display SPI bus ----
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=27
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=55000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1